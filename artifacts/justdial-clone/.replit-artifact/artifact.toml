kind = "web"
previewPath = "/"
title = "Local Business Directory"
version = "1.0.0"
id = "artifacts/justdial-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26064

[services.development]
run = "pnpm --filter @workspace/justdial-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/justdial-clone", "run", "build" ]
publicDir = "artifacts/justdial-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26064"
BASE_PATH = "/"
