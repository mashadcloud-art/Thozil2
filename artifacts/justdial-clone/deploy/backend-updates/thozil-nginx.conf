# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name thozil.com www.thozil.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl;
    server_name thozil.com www.thozil.com;

    # Increase maximum upload file size limit to 50MB
    client_max_body_size 50M;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/thozil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thozil.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve frontend (React build)
    root /var/www/thozil.com;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Backend API (Node.js on port 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}
